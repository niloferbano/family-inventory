name: tests

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: family_test
          POSTGRES_PASSWORD: family_pass
          POSTGRES_DB: family_test
        options: >-
          --health-cmd "pg_isready -U family_test -d family_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Use service names as hosts (no port mapping needed)
      TEST_DATABASE_URL: postgresql+asyncpg://family_test:family_pass@localhost:5432/family_test
      DATABASE_URL: postgresql+psycopg2://family_test:family_pass@localhost:5432/family_test
      CACHE__HOST: redis://redis:6379/0

      JWT_SECRET_KEY: test-secret
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      ACTIVATION_TOKEN_EXPIRE_MINUTES: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root
      - name: Run migrations
        run: poetry run alembic upgrade head

      - name: Run tests
        run: PYTHONPATH=. poetry run pytest -q