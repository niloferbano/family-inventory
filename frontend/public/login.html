<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — Family Inventory</title>
    <style>
      body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background:#f6f5f3; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
      .card { background:white; padding:24px; border-radius:8px; box-shadow:0 6px 20px rgba(0,0,0,0.08); width:320px; }
      label { display:block; margin-top:12px; font-size:13px; color:#333; }
      input { width:100%; padding:8px 10px; margin-top:6px; border:1px solid #ddd; border-radius:6px; }
      button { margin-top:18px; width:100%; padding:10px; background:#1e6b7a; color:white; border:none; border-radius:6px; cursor:pointer; }
      .error { color:#c5554b; margin-top:8px; font-size:13px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h3 style="margin:0 0 8px 0">Sign in</h3>
      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <div id="error" class="error" role="alert" style="display:none"></div>

        <button type="submit">Log in</button>
      </form>
    </div>

    <script>
      const form = document.getElementById('login-form');
      const errEl = document.getElementById('error');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.style.display = 'none';
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
          const res = await fetch('/api/v1/users/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });

          if (!res.ok) {
            const payload = await res.json().catch(() => ({ detail: res.statusText }));
            throw new Error(payload.detail || 'Login failed');
          }

          const data = await res.json();
          const token = data.access_token ?? null;
          if (!token) throw new Error('No token returned');

          localStorage.setItem('auth_token', token);
          // Redirect to SPA root
          window.location.href = '/';
        } catch (err) {
          errEl.textContent = err.message || 'Login failed';
          errEl.style.display = 'block';
        }
      });
    </script>
  </body>
</html>
