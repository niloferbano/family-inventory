services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  postgres:
    image: postgres:16
    container_name: family-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: family_user
      POSTGRES_PASSWORD: family_pass
      POSTGRES_DB: family_inventory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family_user -d family_inventory"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: family-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  postgres-test:
    image: postgres:16
    container_name: family-test-postgres
    environment:
      POSTGRES_USER: family_test
      POSTGRES_PASSWORD: family_pass
      POSTGRES_DB: family_test
    ports:
      - "5433:5432"

  inventory-expiry-cron:
    build:
      context: .
      dockerfile: Dockerfile
    image: family-inventory:local
    command: ["python", "-m", "app.jobs.inventory_expiry_job"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
  smtp:
    image: python:3.12-slim
    command: sh -c "pip install aiosmtpd && python -m aiosmtpd -n -l 0.0.0.0:8025"
    ports:
      - "8025:8025"

volumes:
  pgdata:
  redisdata: